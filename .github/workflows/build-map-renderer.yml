name: Build & Test Map Renderer

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ master, staging, stable ]

# Sunrise added start - отменяем устаревший запуск этой проверки для того же PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
# Sunrise added end

jobs:
  build:
    if: github.actor != 'Sunrise-Bot'
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2

      - name: Setup Submodule
        run: |
          git submodule update --init --recursive

      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5

      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 10.0.x

      # Sunrise edit start - собираем только Map Renderer и запускаем готовую Release-сборку
      - name: Install dependencies
        run: dotnet restore Content.MapRenderer/Content.MapRenderer.csproj

      - name: Build Project
        run: dotnet build Content.MapRenderer/Content.MapRenderer.csproj --configuration Release --no-restore /m

      - name: Run Map Renderer
        run: dotnet bin/Content.MapRenderer/Content.MapRenderer.dll Dev
      # Sunrise edit end

  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
