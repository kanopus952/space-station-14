name: Test Packaging

on:
  push:
    branches: [ master, staging, stable ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      # no docs on which one of these is supposed to work, so
      # why not just do both
      - 'RobustToolbox'
      - 'RobustToolbox/**'
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ master, staging, stable ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '**.git**'
      - '**.yml'
      - 'RobustToolbox'
      - 'RobustToolbox/**'

# Sunrise added start - отменяем устаревший запуск этой проверки для того же PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
# Sunrise added end

jobs:
  # Sunrise edit start - распределяем независимые цели упаковки по матрице и сохраняем единый обязательный статус
  package:
    name: Package ${{ matrix.name }}
    if: github.actor != 'Sunrise-Bot'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: client
            arguments: client
          - name: server (win-x64)
            arguments: server --platform win-x64
          - name: server (win-arm64)
            arguments: server --platform win-arm64
          - name: server (linux-x64)
            arguments: server --platform linux-x64
          - name: server (linux-arm64)
            arguments: server --platform linux-arm64
          - name: server (osx-x64)
            arguments: server --platform osx-x64
          - name: server (osx-arm64)
            arguments: server --platform osx-arm64

    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2

      - name: Setup Submodule
        run: |
          git submodule update --init --recursive

      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5

      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: dotnet restore

      - name: Build Packaging
        run: dotnet build Content.Packaging --configuration Release --no-restore /m

      - name: Package ${{ matrix.name }}
        run: dotnet run --project Content.Packaging --configuration Release --no-build -- ${{ matrix.arguments }}

  build:
    name: Test Packaging
    needs: package
    if: ${{ always() && github.actor != 'Sunrise-Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify packaging jobs
        env:
          PACKAGE_RESULT: ${{ needs.package.result }}
        run: |
          echo "package=$PACKAGE_RESULT"
          if [[ "$PACKAGE_RESULT" != "success" ]]; then
            echo "::error title=Packaging failed::At least one packaging job did not succeed."
            exit 1
          fi
  # Sunrise edit end
