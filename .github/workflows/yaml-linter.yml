name: YAML Linter

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize ]

# Sunrise added start - отменяем устаревший запуск этой проверки для того же PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
# Sunrise added end

jobs:
  build:
    name: YAML Linter
    if: github.actor != 'Sunrise-Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup submodule
        run: |
          git submodule update --init --recursive
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 10.0.x
      # Sunrise edit start - собираем только YAML Linter и запускаем готовую Release-сборку
      - name: Install dependencies
        run: dotnet restore Content.YAMLLinter/Content.YAMLLinter.csproj
      - name: Build
        run: dotnet build Content.YAMLLinter/Content.YAMLLinter.csproj --configuration Release --no-restore /p:WarningsAsErrors= /m
      - name: Run Linter
        run: dotnet bin/Content.YAMLLinter/Content.YAMLLinter.dll
      # Sunrise edit end
