- type: entity
  id: BarberScissors
  name: barber scissors
  description: Is able to reshape the hairstyle of any crew cut to your liking.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Objects/Tools/scissors.rsi
    state: icon
  - type: Item
    storedSprite:
      state: storage
      sprite: Objects/Tools/scissors.rsi
  # Sunrise-start
  #- type: MagicMirror
  #  organs:
  #  - Head
  #  layers:
  #  - Hair
  #  - FacialHair
  # Sunrise-end
  - type: Razor  # Sunrise-edit
  - type: ActivatableUI
    key: enum.RazorUiKey.Key  # Sunrise-edit
    inHandsOnly: true
    requireActiveHand: true
  - type: UserInterface
    interfaces:
      enum.RazorUiKey.Key:  # Sunrise-edit
        type: RazorBoundUserInterface  # Sunrise-edit
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Piercing: 6
    soundHit:
      path: "/Audio/Weapons/bladeslice.ogg"
  - type: PhysicalComposition
    materialComposition:
      Steel: 200
  # Sunrise-start
  - type: Scalpel
  - type: SurgeryTool
    successRate: 0.12
    startSound:
      path: /Audio/_Sunrise/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_Sunrise/Medical/Surgery/scalpel2.ogg
  # Sunrise-end
