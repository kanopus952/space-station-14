#reaper
- type: entity
  id: LeftArmCyberReaper
  name: "left reaper arm"
  parent: [PartCyber, OrganBaseArmLeft]
  components:
    - type: BaseLayerData
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: l_silver_arm
        color: white
    - type: BaseLayerToggledData
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: l_silver_arm_SURG
        color: white
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_silver_arm"
    - type: LimbWithItems
      action: ActionToggleCyberHandLeft
      sound:
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
    - type: LimbItemStorage
      items:
        - ScalpelCyber
        - RetractorCyber
        # - CauteryCyber # Заменяет ScalpelCyber
        - SawCyber
        # - HemostatCyber
        - BoneGelSetterCyber # Заменяет BoneSetterCyber
        - DrillCyber
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyber
    - type: Construction
      graph: ImplantSwitchArmCyberReaper
      node: start

- type: entity
  id: RightArmCyberReaper
  name: "right reaper arm"
