- type: entity
  id: PartCyber
  parent: OrganBase
  name: "cyber body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Iron
        Quantity: 30
  - type: VisualOrganMarkings
    markingData:
      group: None

- type: entity
  id: LeftArmCyber
  name: "left cyber arm"
  parent: [PartCyber, OrganBaseArmLeft]
  components:
    - type: BaseLayerData
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: l_arm
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_arm"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_arm"
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyber
    - type: Construction
      graph: ImplantSwitchArmCyber
      node: start

- type: entity
  id: RightArmCyber
  name: "right cyber arm"
  parent: [PartCyber, OrganBaseArmRight]
