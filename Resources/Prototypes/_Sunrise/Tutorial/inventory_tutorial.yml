    - type: TutorialDropSoftLock
      popup: inv-tut-softlock-keep-hand-items
    - type: TutorialStorageInsertSoftLock
      items:
      - Pen
      - Screwdriver
      popup: inv-tut-softlock-keep-hand-items
  preconditions:
  - !type:ItemHandledCondition
    item: Pen
  conditions:
  - !type:ItemHandledCondition
    item: Screwdriver

