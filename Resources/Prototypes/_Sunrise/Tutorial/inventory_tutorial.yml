- type: tutorialSequence
  id: InventoryTutorial
  duration: 900
  priority: 1
  name: inventory-tutorial-name
  tooltip: inventory-tutorial-tooltip
  grid: /Maps/_Sunrise/Tutorials/inventory_tutorial.yml
  playerEntity: InventoryTutorialPlayer
  steps:
  - InvTutOpenInventory
  - InvTutHandsIntro
  - InvTutPickUpFirstHandItem
  - InvTutSwitchToEmptyHand
  - InvTutPickUpSecondHandItem
  - InvTutDropSecondHandItem
  - InvTutSwitchToFirstHand
  - InvTutDropFirstHandItem
  - InvTutOpenWardrobe
  - InvTutTakeShoes
  - InvTutEquipShoes
  - InvTutTakeGloves
  - InvTutEquipGloves
  - InvTutTakeEyes
  - InvTutEquipEyes
  - InvTutTakeEars
  - InvTutEquipEars
  - InvTutTakeMask
  - InvTutEquipMask
  - InvTutTakeHead
  - InvTutEquipHead
  - InvTutTakeNeck
  - InvTutEquipNeck
  - InvTutTakeOuter
  - InvTutEquipOuter
  - InvTutTakeBack
  - InvTutEquipBack
  - InvTutTakeBelt
  - InvTutEquipBelt
  - InvTutTakeId
  - InvTutEquipId
  - InvTutTakePaper
  - InvTutPutPaperPocket
  - InvTutTakeFlashlight
  - InvTutOpenBackpack
  - InvTutPutFlashlightBackpack
  - InvTutTakeFlashlightBack
  - InvTutTakeScrewdriver
  - InvTutOpenToolbelt
  - InvTutPutScrewdriverToolbelt
  - InvTutTakeScrewdriverBack
  - InvTutFinalState

- type: tutorialStep
  id: InvTutOpenInventory
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-open-inventory-bubble
  chatMessage: inv-tut-open-inventory-chat
  ttsMessage: inv-tut-open-inventory-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: InventoryButton
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:UiControlVisibleCondition
    control: InventoryHeadSlot
    selectors:
    - !type:UiByName
      name: Inventory
    - !type:UiByName
      name: SlotButton_head

- type: tutorialStep
  id: InvTutHandsIntro
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-hands-intro-bubble
  chatMessage: inv-tut-hands-intro-chat
  ttsMessage: inv-tut-hands-intro-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: HandContainer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 4

- type: tutorialStep
  id: InvTutPickUpFirstHandItem
  parent: BaseTutorialStepBase
  target: Pen
  bubble:
    text: inv-tut-pick-up-first-hand-item-bubble
    attachToTarget: true
  chatMessage: inv-tut-pick-up-first-hand-item-chat
  ttsMessage: inv-tut-pick-up-first-hand-item-tts
  observeRange: 12
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: Pen
  - !type:UiByName
    name: HandContainer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      allowedItems:
      - Pen
  conditions:
  - !type:ItemHandledCondition
    item: Pen

- type: tutorialStep
  id: InvTutSwitchToEmptyHand
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-switch-to-empty-hand-bubble
  chatMessage: inv-tut-switch-to-empty-hand-chat
  ttsMessage: inv-tut-switch-to-empty-hand-tts
  uiHighlight:
  - !type:UiByName
    name: HandContainer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
    - type: TutorialDropSoftLock
      popup: inv-tut-softlock-keep-hand-item
    - type: TutorialStorageInsertSoftLock
      items:
      - Pen
      popup: inv-tut-softlock-keep-hand-item
  preconditions:
  - !type:ItemHandledCondition
    item: Pen
  preconditionFailStep: InvTutPickUpFirstHandItem
  conditions:
  - !type:SwapHandsListenedCondition

- type: tutorialStep
  id: InvTutPickUpSecondHandItem
