- type: tutorialSequence
  id: InventoryTutorial
  duration: 720
  priority: 1
  name: inventory-tutorial-name
  tooltip: inventory-tutorial-tooltip
  grid: /Maps/_Sunrise/Tutorials/inventory_tutorial.yml
  playerEntity: InventoryTutorialPlayer
  steps:
  - InvTutOpenInventory
  - InvTutPickUpBeret
  - InvTutEquipBeret
  - InvTutPickUpSmallItem
  - InvTutPutSmallItemPocket
  - InvTutPickUpFlashlight
  - InvTutOpenBackpack
  - InvTutPutFlashlightBackpack
  - InvTutTakeFlashlightBack
  - InvTutPickUpTool
  - InvTutOpenToolbelt
  - InvTutPutToolToolbelt
  - InvTutDropFlashlight
  - InvTutPickUpPen
  - InvTutSwapHandsForScrewdriver
  - InvTutTakeScrewdriver
  - InvTutSwapHandsForPen
  - InvTutDropPen
  - InvTutSwapHandsForScrewdriverDrop
  - InvTutDropScrewdriver
  - InvTutFinalState

- type: tutorialStep
  id: InvTutOpenInventory
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-open-inventory-bubble
  chatMessage: inv-tut-open-inventory-chat
  ttsMessage: inv-tut-open-inventory-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: InventoryButton
  conditions:
  - !type:UiControlVisibleCondition
    control: InventoryHeadSlot
    selectors:
    - !type:UiByName
      name: Inventory
    - !type:UiByName
      name: SlotButton_head

- type: tutorialStep
  id: InvTutPickUpBeret
  parent: BaseTutorialStepBase
  target: ClothingHeadHatBeret
  bubble:
    text: inv-tut-pick-up-beret-bubble
    attachToTarget: true
  chatMessage: inv-tut-pick-up-beret-chat
  ttsMessage: inv-tut-pick-up-beret-tts
  observeRange: 12
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: ClothingHeadHatBeret
  conditions:
  - !type:PickupListenedCondition
    target: ClothingHeadHatBeret

- type: tutorialStep
  id: InvTutEquipBeret
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-equip-beret-bubble
  chatMessage: inv-tut-equip-beret-chat
  ttsMessage: inv-tut-equip-beret-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: SlotButton_head
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialStorageInsertSoftLock
      items:
      - ClothingHeadHatBeret
      targets:
      - ClothingBackpack
      - ClothingBeltUtility
      popup: tutorial-softlock-use-highlighted-inventory
  preconditions:
  - !type:ItemHandledCondition
    item: ClothingHeadHatBeret
    slot: HEAD
  preconditionFailStep: InvTutPickUpBeret
  conditions:
  - !type:InventorySlotContainsCondition
    slot: HEAD
    item: ClothingHeadHatBeret

