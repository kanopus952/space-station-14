- type: tutorialStep
  id: InvTutOpenBackpack
  parent: BaseTutorialStepBase
  bubble:
    text: inv-tut-open-backpack-bubble
  chatMessage: inv-tut-open-backpack-chat
  ttsMessage: inv-tut-open-backpack-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: SecondHotbar
  - !type:UiByName
    name: SlotButton_back
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialUnequipSoftLock
      slots: BACK
      items:
      - ClothingBackpack
      popup: tutorial-softlock-open-storage-first
    - type: TutorialStorageInsertSoftLock
      items:
      - FlashlightLantern
      targets:
      - ClothingBackpack
      - ClothingBeltUtility
      popup: tutorial-softlock-open-storage-first
  preconditions:
  - !type:ItemHandledCondition
    item: FlashlightLantern
    storage: ClothingBackpack
  preconditionFailStep: InvTutPickUpFlashlight
  conditions:
  - !type:BuiOpenListenedCondition
    target: ClothingBackpack
  failures:
  - conditions:
    - !type:InventorySlotContainsCondition
      slot: BACK
      item: ClothingBackpack
      inverted: true
    repairStep: InvTutRepairEquipBackpack
  - conditions:
    - !type:InventorySlotContainsCondition
      slot: POCKET
      item: FlashlightLantern
    repairStep: InvTutRepairFlashlightToHand

