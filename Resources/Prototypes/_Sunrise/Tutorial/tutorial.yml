- type: tutorialCategory
  id: BasicTutorial
  name: base
  tutorials:
  - BasicTutorial

- type: tutorialSequence
  id: BasicTutorial
  duration: 180
  name: basic tutorial
  texture: /Textures/_Sunrise/Interface/Tutorial/image.png
  grid: /Maps/_Sunrise/Tutorials/base_tutorial.yml
  playerEntity: BaseTutorialPlayer
  tooltip: Basic tutorial about base mechanics
  steps:
  - BasicTutorialWalk
  - BasicTutorialEquipJumpsuit
  - BasicTutorialEquipMask
  - BasicTutorialEquipShoes
  - BasicTutorialOpenMaint
  - BasicTutorialPickupFlashlight
  - BasicTutorialTurnOnFlashlight
  - BasicTutorialTryOpenLockedAirlock
  - BasicTutorialPressSignalButton
  - BasicTutorialOpenUnlockedAirlock
  - BasicTutorialDropFlashlight
  - BasicTutorialPickupKnife
  - BasicTutorialAttackClown

- type: tutorialSequence
  id: BasicTutorial2
  name: basic tutorial
  texture: /Textures/_Sunrise/Interface/Tutorial/image1.png
  tooltip: bla bla
  steps:
  - ItemsInteraction
  - ItemsInteraction1

- type: tutorialSequence
  id: BasicTutorial3
  name: basic tutorial
  texture: /Textures/_Sunrise/Interface/Tutorial/radio.png
  tooltip: bla bla
  steps:
  - ItemsInteraction
  - ItemsInteraction1

- type: tutorialStep
  id: BasicTutorialStepBase
  abstract: true
  sender: base-tutorial-sender

- type: tutorialStep
  id: BasicTutorialWalk
  parent: BasicTutorialStepBase
  bubble:
    text: tutorial-basic-walk-bubble
    target:
     type: Self
  chatMessage: tutorial-basic-walk-chat
  ttsMessage: tutorial-basic-walk-tts
  conditions:
  - !type:TravelDistanceCondition
    distance: 10

- type: tutorialStep
  id: ExamineJumpsuitColorGrey
  parent: BasicTutorialStepBase
  bubble:
    text: tutorial-basic-step-examine-bubble
    target:
     type: Self
     prototype: ClothingUniformJumpsuitColorGrey
  chatMessage: tutorial-basic-step-examine-chat
  ttsMessage: tutorial-basic-step-examine-tts
  conditions:
  - !type:ExamineListenedCondition
    target: BaseTutorialPlayer

- type: tutorialStep
