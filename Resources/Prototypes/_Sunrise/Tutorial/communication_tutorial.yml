  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: InventoryButton
  conditions:
  - !type:UiControlVisibleCondition
    control: InventoryEarsSlot
    selectors:
    - !type:UiByName
      name: Inventory
    - !type:UiByName
      name: SlotButton_ears

