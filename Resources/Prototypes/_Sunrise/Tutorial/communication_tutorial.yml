- type: startingGear
  id: CommunicationTutorialPlayerGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitEngineering
    shoes: ClothingShoesColorBlack
    back: ClothingBackpack
    id: EngineerPDA
    ears: CommunicationTutorialHeadset

- type: entity
  parent: ClothingHeadsetEngineering
  id: CommunicationTutorialHeadset
  suffix: Tutorial
  categories: [ HideSpawnMenu ]
  components:
  - type: TelecomExempt

- type: entity
  parent: MessengerServer
  id: CommunicationTutorialMessengerServer
  suffix: Tutorial
  categories: [ HideSpawnMenu ]
  components:
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: Messenger
    receiveFrequencyId: Messenger
    autoConnect: true

- type: entity
  parent: BaseTutorialPlayer
  id: CommunicationTutorialPlayer
  components:
  - type: Loadout
    prototypes: [CommunicationTutorialPlayerGear]
  - type: Godmode
