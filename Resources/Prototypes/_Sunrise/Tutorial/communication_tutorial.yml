- type: tutorialSequence
  id: CommunicationTutorial
  duration: 960
  priority: 10
  name: communication-tutorial-name
  tooltip: communication-tutorial-tooltip
  texture: /Textures/_Sunrise/Tutorial/communication_tutorial.png
  grid: /Maps/_Sunrise/Tutorials/communication_tutorial.yml
  playerEntity: CommunicationTutorialPlayer
  steps:
  # 1. Local chat
  - CommTutLocalChat
  # 2. Whisper
  - CommTutWhisper
  # 3. Emotes
  - CommTutEmote
  # 4. LOOC
  - CommTutLooc
  # 5. Local chat and radio difference
  - CommTutRadioExplain
  # 6. Common radio
  - CommTutCommonRadio
  # 7. Open inventory
  - CommTutOpenInventory
  # 8. Examine headset
  - CommTutRadioUi
  # 9. Department radio
  - CommTutDepartmentRadio
  # 10. Help request example
  - CommTutHelpRequestExample
  # 11. Open PDA messenger
  - CommTutOpenMessenger
  # 12. Messenger chats list
  - CommTutMessengerChats
  # 13. Messenger message area
  - CommTutMessengerMessages
  # 14. Open group chats tab
  - CommTutMessengerGroupTab
  # 15. Select common messenger chat
  - CommTutMessengerCommonChat
  # 16. Send messenger message
  - CommTutSendMessenger
  # 17. IC, LOOC and AHelp
  - CommTutAskHelp

- type: tutorialStep
  id: CommTutLocalChat
  parent: BaseTutorialStepBase
  bubble:
    text: comm-tut-local-chat-bubble
  chatMessage: comm-tut-local-chat-chat
  ttsMessage: comm-tut-local-chat-tts
  uiHighlight:
  - !type:UiByName
    name: Chat
  - !type:UiByName
    name: ChatInput
  - !type:UiByName
    name: Input
  conditions:
  - !type:ChatMessageListenedCondition
    kind: Local

- type: tutorialStep
  id: CommTutWhisper
  parent: BaseTutorialStepBase
  bubble:
    text: comm-tut-whisper-bubble
