  parent: BaseTutorialStepBase
  bubble:
    text: comm-tut-radio-explain-bubble
  chatMessage: comm-tut-radio-explain-chat
  ttsMessage: comm-tut-radio-explain-tts
  uiHighlight:
  - !type:UiByName
    name: Chat
  - !type:UiByName
    name: ChatInput
  - !type:UiByName
