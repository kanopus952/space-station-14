- type: tutorialSequence
  id: IntroductionTutorial
  duration: 540
  priority: 0
  name: introduction-tutorial-name
  tooltip: introduction-tutorial-tooltip
  texture: /Textures/_Sunrise/Tutorial/introduction_tutorial.png
  grid: /Maps/_Sunrise/Tutorials/introduction_tutorial.yml
  playerEntity: IntroductionTutorialPlayer
  steps:
  #  1. Movement basics
  - IntroTutWalk
  #  2. Learn to swap hands
  - IntroTutSwapHands
  #  3. Explain the left item status panel
  - IntroTutLeftStatusPanel
  #  4. Go to locker room
  - IntroTutGoLockerRoom
  #  5. Examine clothing vending machine
  - IntroTutExamineClothingVendor
  #  6. Open clothing vending machine
  - IntroTutOpenClothingVendor
  #  7. Take clothing from vending machine
  - IntroTutTakeClothing
  #  8. Explain inventory
  - IntroTutInventory
  #  9. Take the beret in hand
  - IntroTutHoldBeret
  # 10. Equip new clothing
  - IntroTutEquipClothing
  # 11. Point at an entity
  - IntroTutPointClothingVendor
  # 12. Drop old clothing (skipped if nothing in hand)
  - IntroTutDropOldClothing
  # 13. Go to the center
  - IntroTutGoCenter
  # 14. Lie down and stand up
  - IntroTutLieDownStandUp
  # 15. Explain action bar
  - IntroTutActionBar
  # 16. Explain MHelp
  - IntroTutMHelp


# ─── Step definitions ──────────────────────────────────────────────────────────

#  1. Walk around to learn movement
- type: tutorialStep
  id: IntroTutWalk
  parent: BaseTutorialMovementStepBase
  bubble:
    text: intro-tut-walk-bubble

#  2. Learn to swap hands (placed after walk so player already has the item context)
- type: tutorialStep
  id: IntroTutSwapHands
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-swap-hands-bubble
  chatMessage: intro-tut-swap-hands-chat
  ttsMessage: intro-tut-swap-hands-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: HandContainer
  conditions:
  - !type:SwapHandsListenedCondition

#  3. Explain the left item status panel
- type: tutorialStep
  id: IntroTutLeftStatusPanel
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-left-status-panel-bubble
  chatMessage: intro-tut-left-status-panel-chat
  ttsMessage: intro-tut-left-status-panel-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: StatusPanelLeft
  conditions:
  - !type:StepDelayCondition
    delay: 5

#  4. Head to the locker room
- type: tutorialStep
  id: IntroTutGoLockerRoom
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerLockerRoom
  bubble:
    text: intro-tut-go-locker-room-bubble
  chatMessage: intro-tut-go-locker-room-chat
  ttsMessage: intro-tut-go-locker-room-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerLockerRoom
    distance: 2

#  5. Examine the clothing vending machine
- type: tutorialStep
  id: IntroTutExamineClothingVendor
  parent: BaseTutorialStepBase
  target: VendingMachineClothing
  bubble:
    text: intro-tut-examine-clothing-vendor-bubble
    attachToTarget: true
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialOpenUiSoftLock
      targets:
      - VendingMachineClothing
      popup: int-tut-softlock-open-ui
  chatMessage: intro-tut-examine-clothing-vendor-chat
  ttsMessage: intro-tut-examine-clothing-vendor-tts
  observeRange: 12
  conditions:
  - !type:ExamineListenedCondition
    target: VendingMachineClothing

#  6. Open the clothing vending machine
- type: tutorialStep
  id: IntroTutOpenClothingVendor
  parent: BaseTutorialStepBase
  target: VendingMachineClothing
  bubble:
    text: intro-tut-open-clothing-vendor-bubble
    attachToTarget: true
  chatMessage: intro-tut-open-clothing-vendor-chat
  ttsMessage: intro-tut-open-clothing-vendor-tts
  observeRange: 12
  conditions:
  - !type:BuiOpenListenedCondition
    target: VendingMachineClothing

#  7. Take any clothing from the vending machine
- type: tutorialStep
  id: IntroTutTakeClothing
  parent: BaseTutorialStepBase
  target: VendingMachineClothing
  bubble:
    text: intro-tut-take-clothing-bubble
    attachToTarget: true
  uiHighlight:
  - !type:UiByType
    controlType: VendingMachineMenu
  - !type:UiByName
    name: VendingContents
  - !type:UiByEntityPrototype
    prototype: ClothingHeadHatBeret
  chatMessage: intro-tut-take-clothing-chat
  ttsMessage: intro-tut-take-clothing-tts
  observeRange: 12
  conditions:
  - !type:VendingMachineTakeListenedCondition
    target: VendingMachineClothing
    itemTarget: ClothingHeadHatBeret

#  8. Explain inventory
- type: tutorialStep
  id: IntroTutInventory
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-inventory-bubble
  chatMessage: intro-tut-inventory-chat
  ttsMessage: intro-tut-inventory-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: InventoryButton
  conditions:
  - !type:UiControlVisibleCondition
    control: InventoryHeadSlot
    selectors:
    - !type:UiByName
      name: Inventory
    - !type:UiByName
      name: SlotButton_head

#  9. Take the beret in hand
- type: tutorialStep
  id: IntroTutHoldBeret
  parent: BaseTutorialStepBase
  target: ClothingHeadHatBeret
  bubble:
    text: intro-tut-hold-beret-bubble
    attachToTarget: true
  chatMessage: intro-tut-hold-beret-chat
  ttsMessage: intro-tut-hold-beret-tts
  observeRange: 12
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: ClothingHeadHatBeret
  conditions:
  - !type:ActiveHandContainsCondition
    item: ClothingHeadHatBeret

# 10. Equip the new clothing
- type: tutorialStep
  id: IntroTutEquipClothing
  parent: BaseTutorialEquipStepBase
  bubble:
    text: intro-tut-equip-clothing-bubble
  chatMessage: intro-tut-equip-clothing-chat
  ttsMessage: intro-tut-equip-clothing-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: SlotButton_head
  conditions:
  - !type:EquipListenedCondition
    target: ClothingHeadHatBeret
    slot: HEAD

# 11. Point at a nearby entity
- type: tutorialStep
  id: IntroTutPointClothingVendor
  parent: BaseTutorialStepBase
  target: VendingMachineClothing
  bubble:
    text: intro-tut-point-clothing-vendor-bubble
    attachToTarget: true
  chatMessage: intro-tut-point-clothing-vendor-chat
  ttsMessage: intro-tut-point-clothing-vendor-tts
  observeRange: 12
  conditions:
  - !type:PointListenedCondition

# 12. Drop the old clothing item (skipped if the player has nothing in hand)
- type: tutorialStep
  id: IntroTutDropOldClothing
  parent: BaseTutorialDropStepBase
  bubble:
    text: intro-tut-drop-old-clothing-bubble
  chatMessage: intro-tut-drop-old-clothing-chat
  ttsMessage: intro-tut-drop-old-clothing-tts
  conditions: []
  anyConditions:
  - !type:DropListenedCondition
  - !type:HoldInHandsCondition
    inverted: true

# 13. Go to the center of the location
- type: tutorialStep
  id: IntroTutGoCenter
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerCenter
  bubble:
    text: intro-tut-go-center-bubble
  chatMessage: intro-tut-go-center-chat
  ttsMessage: intro-tut-go-center-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerCenter
    distance: 2

# 14. Lie down and stand up
- type: tutorialStep
  id: IntroTutLieDownStandUp
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-lie-down-stand-up-bubble
  chatMessage: intro-tut-lie-down-stand-up-chat
  ttsMessage: intro-tut-lie-down-stand-up-tts
  conditions:
  - !type:LieDownStandUpListenedCondition
    count: 2

# 15. Explain action bar
- type: tutorialStep
  id: IntroTutActionBar
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-action-bar-bubble
  chatMessage: intro-tut-action-bar-chat
  ttsMessage: intro-tut-action-bar-tts
  uiHighlight:
  - !type:UiByName
    name: Actions
  - !type:UiByName
    name: ActionsContainer
  conditions:
  - !type:StepDelayCondition
    delay: 5

# 16. Explain MHelp
- type: tutorialStep
  id: IntroTutMHelp
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-mhelp-bubble
  chatMessage: intro-tut-mhelp-chat
  ttsMessage: intro-tut-mhelp-tts
  uiHighlight:
  - !type:UiByName
    name: TopBar
  - !type:UiByName
    name: MHelpButton
  conditions:
  - !type:StepDelayCondition
    delay: 7

- type: entity
  parent: BaseTutorialPlayer
  id: IntroductionTutorialPlayer
  components:
  - type: Godmode
