- type: tutorialSequence
  id: IntroductionTutorial
  duration: 600
  name: introduction-tutorial-name
  tooltip: introduction-tutorial-tooltip
  texture: /Textures/_Sunrise/Tutorial/introduction_tutorial.png
  grid: /Maps/_Sunrise/Tutorials/introduction_tutorial.yml
  playerEntity: IntroductionTutorialPlayer
  steps:
  #  1. Movement basics
  - IntroTutWalk
  #  2. Learn to swap hands
  - IntroTutSwapHands
  #  3. Explain the left item status panel
  - IntroTutLeftStatusPanel
  #  4. Go to locker room
  - IntroTutGoLockerRoom
  #  5. Take clothing from vending machine
  - IntroTutTakeClothing
  #  6. Explain inventory
  - IntroTutInventory
  #  7. Equip new clothing
  - IntroTutEquipClothing
  #  8. Drop old clothing (skipped if nothing in hand)
  - IntroTutDropOldClothing
  #  9. Go to the center
  - IntroTutGoCenter
  # 10. Go to the bar
  - IntroTutGoBar
  # 11. Sit on a bar stool
  - IntroTutSitChair
  # 12. Pick up the orange juice
  - IntroTutPickupDrink
  # 13. Drink it
  - IntroTutDrink
  # 14. Put the glass back down
  - IntroTutDropDrink
  # 15. Go behind the counter
  - IntroTutGoBarCounter
  # 16. Examine the locked service airlock
  - IntroTutExamineAirlock
  # 17. Rummage in the bush to find the ID card
  - IntroTutRummageBush
  # 18. Pass through the airlock holding the ID card
  - IntroTutPassAirlock
  # 19. Open the dresser
  - IntroTutOpenDresser
  # 20. Return to center
  - IntroTutGoBackCenter
  # 21. Drop the ID card if still holding it
  - IntroTutDropIdCard
  # 22. Head toward the dark hallway
  - IntroTutGoHallway
  # 23. Pick up the flashlight
  - IntroTutPickupFlashlight
  # 24. Turn on the flashlight
  - IntroTutTurnOnFlashlight
  # 25. Go to the shooting range entrance
  - IntroTutGoRange
  # 26. Try the bolted airlock
  - IntroTutTryOpenBolted
  # 27. Press the signal button
  - IntroTutPressButton
  # 28. Store the flashlight before entering the range
  - IntroTutStoreFlashlight
  # 29. Pick up the practice pistol
  - IntroTutPickupPistol
  # 30. Explain action bar
  - IntroTutActionBar
  # 31. Activate combat mode
  - IntroTutActivateBattleMode
  # 32. Shoot targets
  - IntroTutShoot
  # 33. Pick up the knife
  - IntroTutPickupKnife
  # 34. Attack the clown target
  - IntroTutAttackClown


# ─── Step definitions ──────────────────────────────────────────────────────────

#  1. Walk around to learn movement
- type: tutorialStep
  id: IntroTutWalk
  parent: BaseTutorialMovementStepBase
  bubble:
    text: intro-tut-walk-bubble

#  2. Learn to swap hands (placed after walk so player already has the item context)
- type: tutorialStep
  id: IntroTutSwapHands
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-swap-hands-bubble
  chatMessage: intro-tut-swap-hands-chat
  ttsMessage: intro-tut-swap-hands-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: HandContainer
  conditions:
  - !type:SwapHandsListenedCondition

#  3. Explain the left item status panel
- type: tutorialStep
  id: IntroTutLeftStatusPanel
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-left-status-panel-bubble
  chatMessage: intro-tut-left-status-panel-chat
  ttsMessage: intro-tut-left-status-panel-tts
  uiHighlight:
  - !type:UiByName
    name: Hotbar
  - !type:UiByName
    name: StatusPanelLeft
  conditions:
  - !type:StepDelayCondition
    delay: 5

#  4. Head to the locker room
- type: tutorialStep
  id: IntroTutGoLockerRoom
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerLockerRoom
  bubble:
    text: intro-tut-go-locker-room-bubble
  chatMessage: intro-tut-go-locker-room-chat
  ttsMessage: intro-tut-go-locker-room-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerLockerRoom
    distance: 2

#  5. Take any clothing from the vending machine
- type: tutorialStep
  id: IntroTutTakeClothing
  parent: BaseTutorialStepBase
  target: VendingMachineClothing
  bubble:
    text: intro-tut-take-clothing-bubble
    attachToTarget: true
  chatMessage: intro-tut-take-clothing-chat
  ttsMessage: intro-tut-take-clothing-tts
  observeRange: 12
  conditions:
  - !type:VendingMachineTakeListenedCondition
    target: VendingMachineClothing
    itemTarget: ClothingHeadHatBeret

#  6. Explain inventory
- type: tutorialStep
  id: IntroTutInventory
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-inventory-bubble
  chatMessage: intro-tut-inventory-chat
  ttsMessage: intro-tut-inventory-tts
  uiHighlight:
  - !type:UiByName
    name: Inventory
  - !type:UiByName
    name: InventoryButton
  conditions:
  - !type:StepDelayCondition
    delay: 5

#  7. Equip the new clothing
- type: tutorialStep
  id: IntroTutEquipClothing
  parent: BaseTutorialEquipStepBase
  bubble:
    text: intro-tut-equip-clothing-bubble
  chatMessage: intro-tut-equip-clothing-chat
  ttsMessage: intro-tut-equip-clothing-tts
  conditions:
  - !type:EquipListenedCondition
    target: ClothingHeadHatBeret
    slot: HEAD

#  8. Drop the old clothing item (skipped if the player has nothing in hand)
- type: tutorialStep
  id: IntroTutDropOldClothing
  parent: BaseTutorialDropStepBase
  bubble:
    text: intro-tut-drop-old-clothing-bubble
  chatMessage: intro-tut-drop-old-clothing-chat
  ttsMessage: intro-tut-drop-old-clothing-tts
  preconditions:
  - !type:HoldInHandsCondition
  preconditionFailStep: IntroTutGoCenter
  conditions:
  - !type:DropListenedCondition

#  9. Go to the center of the location
- type: tutorialStep
  id: IntroTutGoCenter
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerCenter
  bubble:
    text: intro-tut-go-center-bubble
  chatMessage: intro-tut-go-center-chat
  ttsMessage: intro-tut-go-center-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerCenter
    distance: 2

# 10. Go to the bar
- type: tutorialStep
  id: IntroTutGoBar
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerBar
  bubble:
    text: intro-tut-go-bar-bubble
  chatMessage: intro-tut-go-bar-chat
  ttsMessage: intro-tut-go-bar-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerBar
    distance: 2

# 11. Sit on a bar stool
- type: tutorialStep
  id: IntroTutSitChair
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-sit-chair-bubble
  chatMessage: intro-tut-sit-chair-chat
  ttsMessage: intro-tut-sit-chair-tts
  observeRange: 8
  conditions:
  - !type:SitListenedCondition

# 12. Pick up the orange juice from the bar counter
- type: tutorialStep
  id: IntroTutPickupDrink
  parent: BaseTutorialPickupStepBase
  target: DrinkOrangeJuice
  bubble:
    text: intro-tut-pickup-drink-bubble
    attachToTarget: true
  chatMessage: intro-tut-pickup-drink-chat
  ttsMessage: intro-tut-pickup-drink-tts
  observeRange: 10
  conditions:
  - !type:PickupListenedCondition
    target: DrinkOrangeJuice

# 13. Drink the orange juice
- type: tutorialStep
  id: IntroTutDrink
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-drink-bubble
  chatMessage: intro-tut-drink-chat
  ttsMessage: intro-tut-drink-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: DrinkOrangeJuice
  conditions:
  - !type:ConsumeListenedCondition
    target: DrinkOrangeJuice

# 14. Put the glass back down
- type: tutorialStep
  id: IntroTutDropDrink
  parent: BaseTutorialDropStepBase
  bubble:
    text: intro-tut-drop-drink-bubble
  chatMessage: intro-tut-drop-drink-chat
  ttsMessage: intro-tut-drop-drink-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: DrinkOrangeJuice
  preconditionFailStep: IntroTutGoBarCounter
  conditions:
  - !type:DropListenedCondition
    target: DrinkOrangeJuice

# 15. Go behind the bar counter
- type: tutorialStep
  id: IntroTutGoBarCounter
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerBarCounter
  bubble:
    text: intro-tut-go-bar-counter-bubble
  chatMessage: intro-tut-go-bar-counter-chat
  ttsMessage: intro-tut-go-bar-counter-tts
  observeRange: 20
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerBarCounter
    distance: 1

# 16. Examine the locked service airlock - player learns it is locked
- type: tutorialStep
  id: IntroTutExamineAirlock
  parent: BaseTutorialStepBase
  target: AirlockServiceLocked
  bubble:
    text: intro-tut-examine-airlock-bubble
    attachToTarget: true
  chatMessage: intro-tut-examine-airlock-chat
  ttsMessage: intro-tut-examine-airlock-tts
  observeRange: 10
  conditions:
  - !type:ExamineListenedCondition
    target: AirlockServiceLocked

# 17. Rummage in the bush to find the ID card
- type: tutorialStep
  id: IntroTutRummageBush
  parent: BaseTutorialStepBase
  target: PottedPlant26NoFade
  bubble:
    text: intro-tut-rummage-bush-bubble
    attachToTarget: true
  chatMessage: intro-tut-rummage-bush-chat
  ttsMessage: intro-tut-rummage-bush-tts
  observeRange: 8
  anyConditions:
  - !type:InteractListenedCondition
    target: PottedPlant26NoFade
  - !type:ActivateInWorldListenedCondition
    target: PottedPlant26NoFade

# 18. Pass through the airlock while holding the ID card
- type: tutorialStep
  id: IntroTutPassAirlock
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerAfterAirlock
  bubble:
    text: intro-tut-pass-airlock-bubble
  chatMessage: intro-tut-pass-airlock-chat
  ttsMessage: intro-tut-pass-airlock-tts
  observeRange: 20
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerAfterAirlock
    distance: 2

# 19. Open the dresser
- type: tutorialStep
  id: IntroTutOpenDresser
  parent: BaseTutorialStepBase
  target: Dresser
  bubble:
    text: intro-tut-open-dresser-bubble
    attachToTarget: true
  chatMessage: intro-tut-open-dresser-chat
  ttsMessage: intro-tut-open-dresser-tts
  observeRange: 10
  conditions:
  - !type:BuiOpenListenedCondition
    target: Dresser

# 20. Return to the center
- type: tutorialStep
  id: IntroTutGoBackCenter
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerCenter
  bubble:
    text: intro-tut-go-back-center-bubble
  chatMessage: intro-tut-go-back-center-chat
  ttsMessage: intro-tut-go-back-center-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerCenter
    distance: 2

# 21. Drop the ID card if still holding it after returning to center
- type: tutorialStep
  id: IntroTutDropIdCard
  parent: BaseTutorialDropStepBase
  bubble:
    text: intro-tut-drop-id-card-bubble
  chatMessage: intro-tut-drop-id-card-chat
  ttsMessage: intro-tut-drop-id-card-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: BartenderIDCard
  preconditionFailStep: IntroTutGoHallway
  conditions:
  - !type:DropListenedCondition
    target: BartenderIDCard

# 22. Head toward the dark corridor - stop at the marker
- type: tutorialStep
  id: IntroTutGoHallway
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerHallway
  bubble:
    text: intro-tut-go-hallway-bubble
  chatMessage: intro-tut-go-hallway-chat
  ttsMessage: intro-tut-go-hallway-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerHallway
    distance: 2

# 23. Pick up the flashlight
- type: tutorialStep
  id: IntroTutPickupFlashlight
  parent: BaseTutorialPickupStepBase
  target: FlashlightLantern
  bubble:
    text: intro-tut-pickup-flashlight-bubble
    attachToTarget: true
  chatMessage: intro-tut-pickup-flashlight-chat
  ttsMessage: intro-tut-pickup-flashlight-tts
  conditions:
  - !type:PickupListenedCondition
    target: FlashlightLantern

# 24. Turn on the flashlight
- type: tutorialStep
  id: IntroTutTurnOnFlashlight
  parent: BaseTutorialUseStepBase
  bubble:
    text: intro-tut-turn-on-flashlight-bubble
  chatMessage: intro-tut-turn-on-flashlight-chat
  ttsMessage: intro-tut-turn-on-flashlight-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: FlashlightLantern
  conditions:
  - !type:UseListenedCondition
    target: FlashlightLantern

# 25. Reach the shooting range entrance
- type: tutorialStep
  id: IntroTutGoRange
  parent: BaseTutorialReachStepBase
  target: IntroTutMarkerRange
  bubble:
    text: intro-tut-go-range-bubble
  chatMessage: intro-tut-go-range-chat
  ttsMessage: intro-tut-go-range-tts
  observeRange: 30
  conditions:
  - !type:ReachMarkerCondition
    marker: IntroTutMarkerRange
    distance: 2

# 26. Try to open the bolted airlock (it will not open, but the interaction fires)
- type: tutorialStep
  id: IntroTutTryOpenBolted
  parent: BaseTutorialInteractStepBase
  target: DoubleGlassAirlockBolted
  bubble:
    text: intro-tut-try-open-bolted-bubble
    attachToTarget: true
  chatMessage: intro-tut-try-open-bolted-chat
  ttsMessage: intro-tut-try-open-bolted-tts
  observeRange: 12
  anyConditions:
  - !type:InteractListenedCondition
    target: DoubleGlassAirlockBolted
  - !type:ActivateInWorldListenedCondition
    target: DoubleGlassAirlockBolted

# 27. Press the signal button to unbolt the airlock
- type: tutorialStep
  id: IntroTutPressButton
  parent: BaseTutorialInteractStepBase
  target: SignalButton
  bubble:
    text: intro-tut-press-button-bubble
    attachToTarget: true
  chatMessage: intro-tut-press-button-chat
  ttsMessage: intro-tut-press-button-tts
  anyConditions:
  - !type:InteractListenedCondition
    target: SignalButton

# 28. Put the flashlight away before entering the shooting range
- type: tutorialStep
  id: IntroTutStoreFlashlight
  parent: BaseTutorialDropStepBase
  bubble:
    text: intro-tut-store-flashlight-bubble
  chatMessage: intro-tut-store-flashlight-chat
  ttsMessage: intro-tut-store-flashlight-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: FlashlightLantern
  preconditionFailStep: IntroTutPickupPistol
  conditions:
  - !type:DropListenedCondition
    target: FlashlightLantern

# 29. Pick up the practice laser pistol
- type: tutorialStep
  id: IntroTutPickupPistol
  parent: BaseTutorialPickupStepBase
  target: WeaponDisablerPractice
  bubble:
    text: intro-tut-pickup-pistol-bubble
    attachToTarget: true
  chatMessage: intro-tut-pickup-pistol-chat
  ttsMessage: intro-tut-pickup-pistol-tts
  observeRange: 12
  conditions:
  - !type:PickupListenedCondition
    target: WeaponDisablerPractice

# 30. Explain action bar
- type: tutorialStep
  id: IntroTutActionBar
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-action-bar-bubble
  chatMessage: intro-tut-action-bar-chat
  ttsMessage: intro-tut-action-bar-tts
  uiHighlight:
  - !type:UiByName
    name: Actions
  - !type:UiByName
    name: ActionsContainer
  conditions:
  - !type:StepDelayCondition
    delay: 5

# 31. Active combat mode
- type: tutorialStep
  id: IntroTutActivateBattleMode
  parent: BaseTutorialActivateAction
  bubble:
    text: intro-tut-combat-mode-bubble
  chatMessage: intro-tut-combat-mode-chat
  ttsMessage: intro-tut-combat-mode-tts
  uiHighlight:
  - !type:UiByName
    name: Actions
  - !type:UiByEntityPrototype
    prototype: ActionCombatModeToggle
  conditions:
  - !type:ActivateActionListenedCondition
    target: ActionCombatModeToggle

# 32. Shoot at the targets (3 shots)
- type: tutorialStep
  id: IntroTutShoot
  parent: BaseTutorialStepBase
  bubble:
    text: intro-tut-shoot-bubble
  chatMessage: intro-tut-shoot-chat
  ttsMessage: intro-tut-shoot-tts
  preconditions:
  - !type:HoldInHandsCondition
    item: WeaponDisablerPractice
  conditions:
  - !type:GunShotListenedCondition
    count: 3

# 33. Pick up the survival knife
- type: tutorialStep
  id: IntroTutPickupKnife
  parent: BaseTutorialPickupStepBase
  target: SurvivalKnife
  bubble:
    text: intro-tut-pickup-knife-bubble
    attachToTarget: true
  chatMessage: intro-tut-pickup-knife-chat
  ttsMessage: intro-tut-pickup-knife-tts
  observeRange: 10
  conditions:
  - !type:PickupListenedCondition
    target: SurvivalKnife

# 34. Attack the clown target with the knife
- type: tutorialStep
  id: IntroTutAttackClown
  parent: BaseTutorialAttackStepBase
  target: TargetClown
  bubble:
    text: intro-tut-attack-clown-bubble
    attachToTarget: true
  chatMessage: intro-tut-attack-clown-chat
  ttsMessage: intro-tut-attack-clown-tts
  observeRange: 12
  conditions:
  - !type:AttackListenedCondition
    target: TargetClown

- type: entity
  parent: BaseTutorialPlayer
  id: IntroductionTutorialPlayer
  components:
  - type: Godmode
