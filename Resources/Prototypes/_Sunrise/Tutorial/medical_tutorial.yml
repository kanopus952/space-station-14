- type: tutorialSequence
  id: MedicalTutorial
  duration: 720
  priority: 5
  name: medical-tutorial-name
  tooltip: medical-tutorial-tooltip
  grid: /Maps/_Sunrise/Tutorials/medical_tutorial.yml
  texture: /Textures/_Sunrise/Tutorial/medical_tutorial.png
  playerEntity: MedicalTutorialPlayer
  steps:
  - MedicalTutWelcome
  - MedicalTutFindPatient
  - MedicalTutTakeAnalyzer
  - MedicalTutScanPatient
  - MedicalTutAnalyzerUpdate
  - MedicalTutExplainAnalyzerPatient
  - MedicalTutExplainAnalyzerVitals
  - MedicalTutExplainAnalyzerAlerts
  - MedicalTutExplainAnalyzerDamage
  - MedicalTutExplainAnalyzerGroups
  - MedicalTutTakeGauze
  - MedicalTutApplyGauze
  - MedicalTutTakeBrutepack
  - MedicalTutApplyBrutepack
  - MedicalTutTakeOintment
  - MedicalTutApplyOintment
  - MedicalTutSelfCareIntro
  - MedicalTutTakeSelfOintment
  - MedicalTutApplySelfOintment
  - MedicalTutFinish
  - TutorialMHelp

- type: tutorialStep
  id: MedicalTutWelcome
  parent: BaseTutorialStepBase
  bubble:
    text: medical-tut-welcome-bubble
  chatMessage: medical-tut-welcome-chat
  ttsMessage: medical-tut-welcome-tts
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 9

- type: tutorialStep
  id: MedicalTutFindPatient
  parent: BaseTutorialStepBase
  target: MedicalTutorialPatient
  bubble:
    text: medical-tut-find-patient-bubble
    attachToTarget: true
  chatMessage: medical-tut-find-patient-chat
  ttsMessage: medical-tut-find-patient-tts
  observeRange: 14
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:ExamineListenedCondition
    target: MedicalTutorialPatient

- type: tutorialStep
  id: MedicalTutTakeAnalyzer
  parent: BaseTutorialStepBase
  target: HandheldHealthAnalyzer
  bubble:
    text: medical-tut-take-analyzer-bubble
    attachToTarget: true
  chatMessage: medical-tut-take-analyzer-chat
  ttsMessage: medical-tut-take-analyzer-tts
  observeRange: 14
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: HandheldHealthAnalyzer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialOpenUiSoftLock
      targets:
      - HandheldHealthAnalyzer
      popup: medical-tut-softlock-open-analyzer
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      allowedItems:
      - HandheldHealthAnalyzer
  conditions:
  - !type:PickupListenedCondition
    target: HandheldHealthAnalyzer

- type: tutorialStep
  id: MedicalTutScanPatient
  parent: BaseTutorialStepBase
  target: MedicalTutorialPatient
  bubble:
    text: medical-tut-scan-patient-bubble
    attachToTarget: true
  chatMessage: medical-tut-scan-patient-chat
  ttsMessage: medical-tut-scan-patient-tts
  observeRange: 14
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: HandheldHealthAnalyzer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      allowedItems:
      - HandheldHealthAnalyzer
  conditions:
  - !type:HealthAnalyzerScanListenedCondition
    target: MedicalTutorialPatient
  - !type:UseListenedCondition
    target: HandheldHealthAnalyzer

- type: tutorialStep
  id: MedicalTutAnalyzerUpdate
  parent: BaseTutorialStepBase
  conditions:
  - !type:StepDelayCondition
    delay: 1

- type: tutorialStep
  id: MedicalTutExplainAnalyzerPatient
  parent: BaseTutorialStepBase
  bubble:
    text: medical-tut-explain-analyzer-patient-bubble
  chatMessage: medical-tut-explain-analyzer-patient-chat
  ttsMessage: medical-tut-explain-analyzer-patient-tts
  blockUiInteraction: true
  uiHighlight:
  - !type:UiByName
    name: HealthAnalyzer
  - !type:UiByName
    name: PatientDataContainer
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: BlockMovement
      blockInteraction: false
      blockUse: false
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 10

- type: tutorialStep
  id: MedicalTutExplainAnalyzerVitals
  parent: BaseTutorialStepBase
  bubble:
    text: medical-tut-explain-analyzer-vitals-bubble
  chatMessage: medical-tut-explain-analyzer-vitals-chat
