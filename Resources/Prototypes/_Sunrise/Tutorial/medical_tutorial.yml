    name: HealthAnalyzer
  - !type:UiByName
    name: DamageLabel
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: BlockMovement
      blockInteraction: false
      blockUse: false
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 10

- type: tutorialStep
