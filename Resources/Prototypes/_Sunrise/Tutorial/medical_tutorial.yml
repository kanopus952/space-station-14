  blockUiInteraction: true
  uiHighlight:
  - !type:UiByName
    name: HealthAnalyzer
  - !type:UiByName
    name: PatientDataContainer
  - !type:UiByChildIndex
    index: 2
  effects:
  - !type:TutorialComponentEffect
    components:
    - type: BlockMovement
      blockInteraction: false
      blockUse: false
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 10

