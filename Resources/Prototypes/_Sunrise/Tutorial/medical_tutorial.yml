  effects:
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      allowedItems:
      - HandheldHealthAnalyzer
      - Gauze1
    - type: TutorialDropSoftLock
      popup: medical-tut-softlock-keep-gauze
  - !type:TutorialComponentEffect
    components:
    - type: TutorialStorageInsertSoftLock
      items:
      - Gauze1
      popup: medical-tut-softlock-keep-gauze
  conditions:
  - !type:HealingListenedCondition
    target: MedicalTutorialPatient
    item: Gauze1

