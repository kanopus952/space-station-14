- type: startingGear
  id: MedicalTutorialPlayerGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitMedicalDoctor
    shoes: ClothingShoesColorBlack
    back: ClothingBackpack
    ears: ClothingHeadsetMedical

- type: entity
  parent: BaseTutorialPlayer
  id: MedicalTutorialPlayer
  components:
  - type: Loadout
    prototypes: [MedicalTutorialPlayerGear]
  - type: Godmode

- type: entity
  parent: BaseMobHuman
  id: MedicalTutorialPatient
  name: medical tutorial patient
  suffix: Training
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Damageable
    damage:
      types:
        Blunt: 5
        Slash: 5
        Heat: 5
  - type: Bloodstream
    bleedAmount: 1
    bleedReductionAmount: 0
  - type: PassiveDamage
    damage: {}

- type: entity
  parent: MarkerBase
  id: MedicalTutorialPatientSpawner
  name: medical tutorial patient spawner
  components:
  - type: ConditionalSpawner
    prototypes:
    - MedicalTutorialPatient
