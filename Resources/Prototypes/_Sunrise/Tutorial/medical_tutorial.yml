  ttsMessage: medical-tut-self-care-intro-tts
  uiHighlight:
  - !type:UiByName
    name: AlertContainer
  effects:
  - !type:TutorialRemoveComponentEffect
    components:
    - type: Godmode
  - !type:TutorialEntityEffect
    effects:
    - !type:HealthChange
      damage:
        types:
          Heat: 5
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      blockAll: true
