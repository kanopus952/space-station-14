  - !type:TutorialComponentEffect
    components:
    - type: BlockMovement
      blockInteraction: false
      blockUse: false
    - type: TutorialPickupSoftLock
      blockAll: true
  conditions:
  - !type:StepDelayCondition
    delay: 10

- type: tutorialStep
  id: MedicalTutTakeGauze
  parent: BaseTutorialStepBase
  target: Gauze1
  bubble:
    text: medical-tut-take-gauze-bubble
    attachToTarget: true
  chatMessage: medical-tut-take-gauze-chat
  ttsMessage: medical-tut-take-gauze-tts
  observeRange: 14
  uiHighlight:
  - !type:UiByEntityPrototype
    prototype: Gauze1
  effects:
  - !type:TutorialRemoveComponentEffect
    components:
    - type: BlockMovement
  - !type:TutorialComponentEffect
    components:
    - type: TutorialPickupSoftLock
      allowedItems:
      - HandheldHealthAnalyzer
      - Gauze1
  conditions:
  - !type:PickupListenedCondition
    target: Gauze1

- type: tutorialStep
