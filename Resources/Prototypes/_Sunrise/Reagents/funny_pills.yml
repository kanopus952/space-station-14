# 1 - Смехотерон (смех)
- type: reagent
  id: FunnyPillLaughter
  name: reagent-name-funny-unknown
  group: Special
  desc: reagent-desc-funny-unknown
  physicalDesc: reagent-physical-desc-funny
  flavor: funny
  color: "#FFD700"
  metabolisms:
    Medicine:
      metabolismRate: 1
      effects:
      - !type:Emote
        emote: Laugh
        showInChat: true
        force: true
        probability: 0.6

