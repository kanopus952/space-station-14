- type: entity
  parent: [ BaseCartridge, BaseMajorContraband ]
  id: CartridgeAntiMaterielPenetrator
  name: cartridge (15mm armor-pierce)
  description: A high-power cartridge used by high-precision rifles.
  components:
  - type: Tag
    tags:
    - CartridgeAntiMateriel
  - type: CartridgeAmmo
    proto: AntiMaterielBulletTrace
  - type: Sprite
    scale: 0.8,0.8
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Casings/12.7x99.rsi
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#9b0000"
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 20

