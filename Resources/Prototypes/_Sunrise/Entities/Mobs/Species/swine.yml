- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceSwine
  name: swine appearance
  components:
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: TorsoSwine
        - id: HeadSwine
        - id: LeftArmSwine
        - id: RightArmSwine
        - id: LeftHandSwine
        - id: RightHandSwine
        - id: LeftLegSwine
        - id: RightLegSwine
        - id: LeftFootSwine
        - id: RightFootSwine
        - id: OrganHumanBrain
        - id: OrganHumanEyes
        - id: OrganHumanTongue
        - id: OrganAnimalHeart
        - id: OrganHumanLungs
        - id: OrganSwineStomach
        - id: OrganAnimalLiver
        - id: OrganHumanKidneys

- type: entity
  name: Urist McPig
  parent:
  - AppearanceSwine
  - BaseSpeciesMobOrganic
  id: BaseMobSwine
  abstract: true
  components:
  - type: Interactions
  - type: HumanoidAppearance
    species: Swine
  - type: Hunger
    baseDecayRate: 0.08
  - type: Thirst
    baseDecayRate: 0.15
    dehydrationDamage:
      types:
        Bloodloss: 0.5
        Asphyxiation: 0.5
  - type: Icon
    sprite: _Sunrise/Mobs/Species/Swine/parts.rsi
    state: full
  - type: Speech
    speechSounds: Swine
    speechVerb: Swine
    allowedEmotes: ['Oink']
  - type: MovementSpeedModifier
    baseSprintSpeed: 0.9
  - type: SlowOnDamage
    speedModifierThresholds:
      80: 0.8
      90: 0.9
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Stamina
    baseCritThreshold: 100
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexSwine
      Female: UnisexSwine
      Unsexed: UnisexSwine
  - type: SwineAccent
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Swine
  - type: Butcherable
    butcheringType: Spike # TODO human.
    spawned:
    - id: FoodMeatSwine
      amount: 5
  - type: FootprintEmitter

- type: entity
  save: false
  name: Urist McHands
  parent: AppearanceSwine
  id: MobSwineDummy
  categories: [ HideSpawnMenu ]
  description: A dummy swine meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Swine
