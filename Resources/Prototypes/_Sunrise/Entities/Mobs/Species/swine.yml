- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceSwine
  name: swine appearance
  components:
  - type: InitialBody
    organs:
      Torso: TorsoSwine
      Head: HeadSwine
      ArmLeft: LeftArmSwine
      ArmRight: RightArmSwine
      HandRight: RightHandSwine
      HandLeft: LeftHandSwine
      LegLeft: LeftLegSwine
      LegRight: RightLegSwine
      FootLeft: LeftFootSwine
      FootRight: RightFootSwine
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Heart: OrganAnimalHeart
      Lungs: OrganHumanLungs
      Stomach: OrganSwineStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys

- type: entity
  name: Urist McPig
  parent:
  - AppearanceSwine
  - BaseSpeciesMobOrganic
  id: BaseMobSwine
  abstract: true
  components:
  - type: Interactions
  - type: HumanoidProfile
    species: Swine
  - type: SunriseHumanoidProfile
  - type: SunriseHumanoidBaseLayers
  - type: Hunger
    baseDecayRate: 0.08
  - type: Thirst
    baseDecayRate: 0.15
    dehydrationDamage:
      types:
        Bloodloss: 0.5
        Asphyxiation: 0.5
  - type: Icon
    sprite: _Sunrise/Mobs/Species/Swine/parts.rsi
    state: full
  - type: Speech
    speechSounds: Swine
    speechVerb: Swine
    allowedEmotes: ['Oink']
  - type: MovementSpeedModifier
  - type: SlowOnDamage
    speedModifierThresholds:
      80: 0.9
      90: 0.95
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Stamina
    baseCritThreshold: 125
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Vocal
    sounds:
      Male: UnisexSwine
      Female: UnisexSwine
      Unsexed: UnisexSwine
  - type: SwineAccent
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Swine
  - type: Butcherable
    butcheringType: Spike # TODO human.
    spawned:
    - id: FoodMeatSwine
      amount: 5
  - type: FootprintEmitter
    leftBareFootState: [ footprint-left-bare-spider ]
    rightBareFootState: [ footprint-right-bare-spider ]

- type: entity
  save: false
  name: Urist McHands
  parent: AppearanceSwine
  id: MobSwineDummy
  categories: [ HideSpawnMenu ]
  description: A dummy swine meant to be used in character setup.
  components:
  - type: HumanoidProfile
    species: Swine
  - type: SunriseHumanoidProfile
  - type: SunriseHumanoidBaseLayers
