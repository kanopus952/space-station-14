- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceDemon
  name: demon appearance
  components:
  - type: InitialBody
    organs:
      Torso: TorsoDemon
      Head: HeadDemon
      ArmLeft: LeftArmDemon
      ArmRight: RightArmDemon
      HandRight: RightHandDemon
      HandLeft: LeftHandDemon
      LegLeft: LeftLegDemon
      LegRight: RightLegDemon
      FootLeft: LeftFootDemon
      FootRight: RightFootDemon
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Heart: OrganAnimalHeart
      Lungs: OrganHumanLungs
      Stomach: OrganDemonStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys

- type: entity
  save: false
  name: Urisst' Mzhand Demon
  parent:
  - AppearanceDemon
  - BaseSpeciesMobOrganic
  id: BaseMobDemon
  abstract: true
  components:
  - type: Interactions
  - type: HumanoidProfile
    species: Demon
  - type: SunriseHumanoidProfile
  - type: SunriseHumanoidBaseLayers
  - type: Hunger
  - type: Thirst
    dehydrationDamage:
      types:
        Bloodloss: 0.5
        Asphyxiation: 0.5
  - type: Icon
    sprite: _Sunrise/Mobs/Species/Demon/parts.rsi
    state: full_m
  - type: Sprite
    netsync: false
    noRot: true
    drawdepth: Mobs
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatDemon
      amount: 5
  - type: Speech
    speechSounds: Lizard
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: FemaleHuman
  - type: Damageable
    damageContainer: Biological
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Piercing: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 400
    coldDamageThreshold: 193  #starting temperature damage treshold
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 0.3 #per second, scales with temperature & other constants
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.5
    baseSprintSpeed : 4.5
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Perishable
  - type: FootprintEmitter

- type: entity
  save: false
  name: Urist McHands
  parent: AppearanceDemon
  id: MobDemonDummy
  categories: [ HideSpawnMenu ]
  description: A dummy reptilian meant to be used in character setup.
  components:
  - type: HumanoidProfile
    species: Demon
  - type: SunriseHumanoidProfile
  - type: SunriseHumanoidBaseLayers
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
