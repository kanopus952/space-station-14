- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceTajaran
  name: tajaran appearance
  components:
  - type: InitialBody
    organs:
      Torso: TorsoTajaran
      Head: HeadTajaran
      ArmLeft: LeftArmTajaran
      ArmRight: RightArmTajaran
      HandRight: RightHandTajaran
      HandLeft: LeftHandTajaran
      LegLeft: LeftLegTajaran
      LegRight: RightLegTajaran
      FootLeft: LeftFootTajaran
      FootRight: RightFootTajaran
      Brain: OrganHumanBrain
      Eyes: OrganTajaranEyes
      Tongue: OrganHumanTongue
      Heart: OrganAnimalHeart
      Lungs: OrganHumanLungs
      Stomach: OrganTajaranStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys

- type: entity
  parent:
  - AppearanceTajaran
  - BaseSpeciesMobOrganic
  id: BaseMobTajaran
  abstract: true
  components:
  - type: MessyDrinker
    spillChance: 0.2
  - type: Interactions
  - type: HumanoidProfile
    species: Tajaran
  - type: SunriseHumanoidProfile
  - type: SunriseHumanoidBaseLayers
  - type: HideableHumanoidLayers
    hideLayersOnEquip:
    - Snout
    - HeadTop
    - HeadSide
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatTajaran
      amount: 5
  - type: TajaranAccent
  - type: Hunger
  - type: Speech
    speechVerb: Felinid
    allowedEmotes: ['Mew', 'Meow', 'Hisses', 'Purr', 'Growl']
  - type: Thirst
    dehydrationDamage:
      types:
        Bloodloss: 0.5
        Asphyxiation: 0.5
  - type: Icon
    sprite: _Sunrise/Mobs/Species/Tajaran/parts.rsi
    state: tajaran_m
  - type: JumpAbility
    action: ActionVulpkaninGravityJump
    canCollide: true
    jumpDistance: 3
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: 1.33
        volume: -5
        variation: 0.05
  - type: MeleeWeapon
    hidden: false
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcClaw
    attackRate: 1
    damage:
      types:
        Blunt: 1
        Slash: 5
  - type: Vocal
    sounds:
      Male: MaleTajaran
      Female: FemaleTajaran
      Unsexed: MaleTajaran
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage
    heatDamageThreshold: 350
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.2
    heatDamage:
      types:
        Heat : 0.1
  - type: FlashModifier
    modifier: 1.4
  - type: Perishable
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
  - type: Inventory
    speciesId: human
    femaleDisplacements:
      jumpsuit-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit-female
      head-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
    displacements:
      head-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
      shoes-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: shoes
      socks-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: socks
      outerClothing-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: outer
      hardsuit-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: hardsuit
    maleDisplacements:
      jumpsuit-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: jumpsuit
      shoes-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: shoes
      socks-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: socks
      outerClothing-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: outer
      hardsuit-body-curved-tajaran:
        sizeMaps:
          32:
            sprite: _Sunrise/Mobs/Species/Reptilian/displacement.rsi
            state: hardsuit
