- type: entity
  parent: BaseBeaker
  name: Ampula
  id: Ampula
  components:
  - type: Sprite
    scale: 0.75,0.75
    sprite: _Sunrise/HardsuitInjection/ampula.rsi
    layers:
      - state: beaker
      - state: beaker1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _Sunrise/HardsuitInjection/ampula.rsi
    size: Small
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 20
  - type: Ampula
  - type: Tag
    tags:
    - FitsHardsuit

- type: entity
  parent: Ampula
  id: AmpulaPirate
  components:
  - type: Sprite
    scale: 0.8,0.8
    sprite: _Sunrise/HardsuitInjection/ampula.rsi
    layers:
      - state: pirate
      - state: beaker1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 25
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: beaker
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassClockwork:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: ActionToggleInjection
  name: toggle the EC
  description: Toggles EC
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 1 # equip noise spam.
    icon:
      sprite: _Sunrise/HardsuitInjection/main.rsi
      state: closeopen
  - type: InstantAction
    event: !type:ToggleECEvent

- type: entity
  id: ActionInjection
  name: Injecting from the EC
  description: Injects substances from an ampoule contained in the emergency compartment
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 1 # equip noise spam.
    icon:
      sprite: _Sunrise/HardsuitInjection/main.rsi
      state: inject
  - type: InstantAction
    event: !type:InjectionEvent

