- type: entity
  id: PartPredator
  parent: OrganBase
  name: "predator body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: FluorosulfuricAcidHumanoidXeno
        Quantity: 10
  - type: VisualOrganMarkings
    markingData:
      group: Predator

- type: entity
  id: TorsoPredator
  name: "predator torso"
  parent: [PartPredator, OrganBaseTorso]
  components:
  - type: Sprite
    sprite: _Sunrise/Mobs/Species/Predator/parts.rsi/
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: FluorosulfuricAcidHumanoidXeno
        Quantity: 20

