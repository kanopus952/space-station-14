#UpgradedMechwright  #fixic =3
- type: entity
  id: LeftArmCyberUpgradedMechwright
  name: "left fixic arm"
  parent: [PartCyber, OrganBaseArmLeft]
  components:
    - type: BaseLayerData
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: l_steel_arm
        color: white
    - type: BaseLayerToggledData
      data:
        sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
        state: l_steel_arm_TOOLS
        color: white
    - type: Sprite
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_steel_arm"
    - type: Icon
      sprite: _Starlight/Mobs/Species/Cyberlimbs/parts.rsi
      state: "l_steel_arm"
    - type: LimbWithItems
      action: ActionToggleCyberHandLeft
      sound:
        path: /Audio/_Starlight/Medical/Cyber/deploy.ogg
    - type: LimbItemStorage
      items:
        - JawsOfLifeCyber
        - PowerDrillCyber
        - WelderExperimentalCyber
        - RCDRechargingMini
        - trayScanner
    - type: WithAttachedBodyParts
      parts:
        left hand: LeftHandCyber
    - type: Construction
      graph: ImplantSwitchArmCyberMechwright
      node: upgraded_left

