- type: entity
  id: PartResomi
  parent: OrganBase
  name: "resomi body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoResomi
  name: "resomi torso"
  parent: [PartResomi, OrganBaseTorso]
  components:
  - type: Sprite
    sprite: _Sunrise/Mobs/Species/Resomi/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

