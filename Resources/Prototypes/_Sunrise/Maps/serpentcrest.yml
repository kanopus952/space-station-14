- type: gameMap
  id: SunriseSerpentcrest
  mapName: 'Serpentcrest'
  mapPath: /Maps/_Sunrise/Station/Serpentcrest.yml
  minPlayers: 60
  maxPlayers: 150
  stations:
    SunriseSerpentcrest:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Serpentcrest {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'B'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Sunrise/Shuttles/Evac/emergency_syndicate.yml
        - type: SpawnGridAndDockToStation
          grids:
          - gridPath: /Maps/_Sunrise/Shuttles/Salvage/chisel.yml
            priorityTag: DockMining
        - type: StationCargoShuttle
          path: /Maps/_Sunrise/Shuttles/cargo_syndicate.yml
        - type: StationJobs
          availableJobs:
            #command (8)
            Captain: [ 1, 1 ]
